<section class="restaurant-form-card">
  <p *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </p>

  <form class="form-grid" (ngSubmit)="submit()">
    <label>
      {{ labels.name }}
      <input
        type="text"
        name="restaurantName"
        [(ngModel)]="form.name"
        placeholder="Ej. Burger Palace"
        required
      />
    </label>

    <label>
      {{ labels.rfc }}
      <input
        type="text"
        name="restaurantRfc"
        [(ngModel)]="form.rfc"
        placeholder="Ej. ABC010101ABC"
        maxlength="13"
        required
      />
    </label>

    <label>
      {{ labels.description }}
      <textarea
        name="restaurantDescription"
        [(ngModel)]="form.description"
        placeholder="Describe brevemente tu restaurante"
      ></textarea>
    </label>

    <div class="logo-upload">
      <span class="field-title">{{ labels.logo }}</span>

      <label class="file-drop">
        <input
          type="file"
          accept="image/*"
          (change)="onLogoSelected($event)"
        />

        <ng-container *ngIf="!logoPreviewUrl">
          <span class="file-icon">📷</span>
          <strong>{{ labels.selectLogo }}</strong>
          <small>{{ labels.logoHint }}</small>
        </ng-container>

        <img
          *ngIf="logoPreviewUrl"
          [src]="logoPreviewUrl"
          alt="Vista previa del logo"
        />
      </label>

      <button
        *ngIf="logoPreviewUrl"
        type="button"
        class="secondary-button"
        (click)="removeSelectedLogo()"
      >
        {{ labels.removeLogo }}
      </button>

      <small class="hint">
        {{ labels.emptyLogoHint }}
      </small>
    </div>

    <div class="form-actions">
      <button
        type="submit"
        class="submit-button"
        [disabled]="saving || uploadingLogo"
      >
        {{
          uploadingLogo
            ? labels.uploadingLogoButton
            : saving
              ? isEditMode
                ? labels.updatingButton
                : labels.creatingButton
              : isEditMode
                ? labels.updateButton
                : labels.createButton
        }}
      </button>

      <button
        *ngIf="isEditMode"
        type="button"
        class="secondary-button"
        [disabled]="saving || uploadingLogo"
        (click)="onCancel()"
      >
        {{ labels.cancelButton }}
      </button>
    </div>
  </form>
</section>
