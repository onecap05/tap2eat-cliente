<section class="restaurant-card">
  <div class="restaurant-logo-wrapper">
    <img
      *ngIf="restaurant.logo?.url"
      [src]="restaurant.logo?.url"
      [alt]="labels.logoAlt"
      class="restaurant-logo"
    />

    <div *ngIf="!restaurant.logo?.url" class="restaurant-logo placeholder">
      {{ restaurant.name.charAt(0) }}
    </div>
  </div>

  <div class="restaurant-info">
    <span class="eyebrow">{{ labels.restaurant }}</span>
    <h1>{{ restaurant.name }}</h1>
    <p>{{ restaurant.description || labels.noDescription }}</p>
  </div>

  <div class="restaurant-actions">
    <span class="badge">
      {{ restaurant.active ? labels.active : labels.deleted }}
    </span>

    <button
      type="button"
      class="action-button secondary-button"
      (click)="editRestaurant.emit()"
    >
      {{ labels.edit }}
    </button>

    <button
      *ngIf="restaurant.active"
      type="button"
      class="action-button danger-button"
      (click)="deleteRestaurant.emit()"
    >
      {{ labels.delete }}
    </button>

    <button
      *ngIf="!restaurant.active"
      type="button"
      class="action-button secondary-button"
      (click)="restoreRestaurant.emit()"
    >
      {{ labels.restore }}
    </button>
  </div>
</section>
