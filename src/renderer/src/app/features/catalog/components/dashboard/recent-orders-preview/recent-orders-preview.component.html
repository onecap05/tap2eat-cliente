<section class="recent-card">
  <h3>Pedidos Recientes</h3>

  <div *ngIf="orders.length > 0; else emptyOrders" class="orders-list">
    <article *ngFor="let order of orders" class="order-row">
      <div class="order-avatar">🛍</div>

      <div class="order-info">
        <strong>{{ order.customer }}</strong>
        <span>Orden #{{ order.id }} · {{ order.items }} items</span>
      </div>

      <div class="order-total">
        <strong>{{ order.total | currency:'MXN':'symbol':'1.2-2' }}</strong>
        <span>{{ order.time }}</span>
      </div>

      <span class="status">{{ order.status }}</span>
    </article>
  </div>

  <ng-template #emptyOrders>
    <p class="empty-orders">
      No hay pedidos recientes disponibles para mostrar.
    </p>
  </ng-template>
</section>
