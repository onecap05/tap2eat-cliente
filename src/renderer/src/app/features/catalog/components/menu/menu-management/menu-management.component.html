<section class="menu-page">
  <header class="menu-header">
    <div>
      <h2>Gestión de Menú</h2>
      <p>Administra tus productos, categorías, precios y orden del menú.</p>
    </div>

    <button
      type="button"
      class="add-product-button"
      (click)="openCreateProductForm()"
    >
      <span>+</span>
      Agregar Producto
    </button>
  </header>

  <div *ngIf="categories.length > 0" class="category-tabs">
    <button
      *ngFor="let category of orderedCategories"
      type="button"
      class="category-tab"
      [class.active]="selectedCategoryId === category.id"
      [class.paused]="isCategoryPaused(category)"
      [class.out-of-schedule]="isCategoryOutOfSchedule(category)"
      (click)="selectCategory(category.id)"
    >
      <strong>{{ category.name }}</strong>
      <small>{{ getCategoryAvailabilityLabel(category) }}</small>
      <span>{{ productsByCategory(category.id).length }}</span>
    </button>
  </div>

  <section class="selected-category-panel" *ngIf="selectedCategoryId">
    <div>
      <h3>{{ selectedCategoryName }}</h3>
      <p>
        Arrastra los productos para cambiar el orden dentro de esta categoría.
        <span *ngIf="savingProductOrder">Guardando orden...</span>
      </p>
    </div>
  </section>

  <app-product-table
    [products]="selectedCategoryProducts"
    [categories]="categories"
    [selectedCategory]="selectedCategory"
    [reordering]="savingProductOrder"
    (editProduct)="openEditProductForm($event)"
    (pauseProduct)="openPauseProductModal($event)"
    (resumeProduct)="onResumeProduct($event)"
    (deleteProduct)="onDeleteProduct($event)"
    (reorderProducts)="onReorderProducts($event)"
  />

  <app-category-list
    [categories]="categories"
    (newCategory)="openCreateCategoryForm()"
    (editCategory)="openEditCategoryForm($event)"
  />

  <app-owner-modal
    *ngIf="showProductForm"
    [title]="selectedProductToEdit ? 'Editar producto' : 'Nuevo producto'"
    [subtitle]="selectedProductToEdit ? 'Actualiza la información del producto.' : 'Agrega un producto al menú del restaurante.'"
    (closeModal)="closeProductForm()"
  >
    <app-product-form
      [categories]="categories"
      [saving]="creatingProduct || updatingProduct"
      [productToEdit]="selectedProductToEdit"
      (createProduct)="onCreateProduct($event)"
      (updateProduct)="onUpdateProduct($event)"
    />
  </app-owner-modal>

  <app-owner-modal
    *ngIf="showCategoryForm"
    [title]="selectedCategoryToEdit ? 'Editar categoría' : 'Nueva categoría'"
    [subtitle]="selectedCategoryToEdit ? 'Actualiza la información y horario de la categoría.' : 'Organiza tus productos por secciones del menú.'"
    (closeModal)="closeCategoryForm()"
  >
    <app-category-form
      [saving]="creatingCategory || updatingCategory"
      [categoryToEdit]="selectedCategoryToEdit"
      (createCategory)="onCreateCategory($event)"
      (updateCategory)="onUpdateCategory($event)"
    />
  </app-owner-modal>

  <app-owner-modal
    *ngIf="selectedProductToPause"
    title="Pausar producto"
    subtitle="Indica por qué el producto no está disponible temporalmente."
    (closeModal)="closePauseProductModal()"
  >
    <form class="pause-form" (ngSubmit)="submitPauseProduct()">
      <label>
        Producto
        <input
          type="text"
          [value]="selectedProductToPause.name"
          disabled
        />
      </label>

      <label>
        Motivo
        <select
          name="temporaryReason"
          [(ngModel)]="pauseForm.temporaryReason"
          required
        >
          <option *ngFor="let option of pauseReasonOptions" [value]="option.value">
            {{ option.label }}
          </option>
        </select>
      </label>

      <label>
        Detalle opcional
        <textarea
          name="temporaryReasonDetail"
          [(ngModel)]="pauseForm.temporaryReasonDetail"
          placeholder="Ej. Se agotó el pan artesanal."
        ></textarea>
      </label>

      <button type="submit" [disabled]="pausingProduct">
        {{ pausingProduct ? 'Pausando...' : 'Pausar producto' }}
      </button>
    </form>
  </app-owner-modal>
</section>
