<section class="form-card">
  <div class="form-header">
    <h3>Nuevo producto</h3>
    <p>Agrega un producto al menú del restaurante.</p>
  </div>

  <p *ngIf="categories.length === 0" class="warning">
    Primero necesitas crear una categoría.
  </p>

  <p *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </p>

  <form class="form-grid" (ngSubmit)="submit()">
    <label>
      Categoría
      <select
        name="productCategoryId"
        [(ngModel)]="form.categoryId"
        required
      >
        <option value="">Selecciona una categoría</option>
        <option *ngFor="let category of categories" [value]="category.id">
          {{ category.name }}
        </option>
      </select>
    </label>

    <label>
      Nombre
      <input
        type="text"
        name="productName"
        [(ngModel)]="form.name"
        placeholder="Ej. Hamburguesa clásica"
        required
      />
    </label>

    <label>
      Descripción
      <textarea
        name="productDescription"
        [(ngModel)]="form.description"
        placeholder="Descripción breve del producto"
      ></textarea>
    </label>

    <div class="form-row">
      <label>
        Tipo
        <select name="productType" [(ngModel)]="form.productType">
          <option value="SIMPLE">Simple</option>
          <option value="CUSTOMIZABLE">Personalizable</option>
        </select>
      </label>

      <label>
        Precio
        <input
          type="number"
          step="0.01"
          min="0"
          name="productPrice"
          [(ngModel)]="form.price"
          placeholder="Ej. 120"
          required
        />
      </label>
    </div>

    <div class="image-upload">
      <span class="field-title">Imagen del producto</span>

      <label class="file-drop">
        <input
          type="file"
          accept="image/*"
          (change)="onImageSelected($event)"
        />

        <ng-container *ngIf="!imagePreviewUrl">
          <span class="file-icon">📷</span>
          <strong>Seleccionar imagen</strong>
          <small>JPG, PNG o WEBP. Máximo 5 MB.</small>
        </ng-container>

        <img
          *ngIf="imagePreviewUrl"
          [src]="imagePreviewUrl"
          alt="Vista previa del producto"
        />
      </label>

      <button
        *ngIf="imagePreviewUrl"
        type="button"
        class="secondary-button"
        (click)="removeSelectedImage()"
      >
        Quitar imagen
      </button>

      <small class="hint">
        Si no seleccionas imagen, el backend asignará una imagen por defecto.
      </small>
    </div>

    <div class="switch-row">
      <label class="checkbox-label">
        <input
          type="checkbox"
          name="productFeatured"
          [(ngModel)]="form.featured"
        />
        Marcar como destacado
      </label>

      <label class="checkbox-label">
        <input
          type="checkbox"
          name="productAvailable"
          [(ngModel)]="form.available"
        />
        Disponible
      </label>
    </div>

    <div class="option-group">
      <span class="field-title">Características alimentarias</span>

      <div class="chips">
        <button
          *ngFor="let option of dietaryFlagOptions"
          type="button"
          class="chip"
          [class.selected]="isDietaryFlagSelected(option.value)"
          (click)="toggleDietaryFlag(option.value)"
        >
          {{ option.label }}
        </button>
      </div>
    </div>

    <div class="option-group">
      <span class="field-title">Alérgenos</span>

      <div class="chips">
        <button
          *ngFor="let option of allergenOptions"
          type="button"
          class="chip"
          [class.selected]="isAllergenSelected(option.value)"
          (click)="toggleAllergen(option.value)"
        >
          {{ option.label }}
        </button>
      </div>
    </div>

    <button
      type="submit"
      class="submit-button"
      [disabled]="saving || uploadingImage || categories.length === 0"
    >
      {{ uploadingImage ? 'Subiendo imagen...' : saving ? 'Creando...' : 'Crear producto' }}
    </button>
  </form>
</section>
