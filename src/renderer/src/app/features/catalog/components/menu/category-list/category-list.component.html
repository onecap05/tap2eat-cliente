<section class="categories-card">
  <div class="categories-header">
    <h3>Categorías</h3>

    <button type="button" class="new-category-button" (click)="requestNewCategory()">
      <span>+</span>
      Nueva Categoría
    </button>
  </div>

  <p *ngIf="categories.length === 0" class="empty-text">
    Todavía no hay categorías. Crea una para organizar tus productos.
  </p>

  <div *ngIf="categories.length > 0" class="category-list">
    <div
      *ngFor="let category of categories"
      class="category-chip"
    >
      <span class="category-name">{{ category.name }}</span>

      <button
        type="button"
        class="edit-category-button"
        title="Editar categoría"
        (click)="requestEditCategory(category)"
      >
        ✎
      </button>

      <button
        type="button"
        class="delete-category-button"
        title="Eliminar categoría"
        [disabled]="deletingCategory"
        (click)="requestDeleteCategory(category)"
      >
        🗑
      </button>
    </div>
  </div>
</section>
