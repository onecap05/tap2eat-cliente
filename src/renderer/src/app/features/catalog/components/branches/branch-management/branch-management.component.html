<section class="branches-page">
  <header class="branches-header">
    <div>
      <h2>Gestión de Sucursales</h2>
      <p>Administra las ubicaciones físicas del restaurante</p>
    </div>

    <button
      type="button"
      class="add-branch-button"
      (click)="toggleBranchForm()"
    >
      <span>+</span>
      Nueva Sucursal
    </button>
  </header>

  <app-branch-list
    [branches]="branches"
  />

  <app-owner-modal
    *ngIf="showBranchForm"
    title="Nueva sucursal"
    subtitle="Agrega una ubicación donde tu restaurante atiende pedidos."
    (closeModal)="closeBranchForm()"
  >
    <app-branch-form
      [saving]="creatingBranch"
      (createBranch)="onCreateBranch($event)"
    />
  </app-owner-modal>
</section>
