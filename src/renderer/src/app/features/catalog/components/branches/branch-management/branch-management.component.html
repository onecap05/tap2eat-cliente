<section class="branches-page">
  <header class="branches-header">
    <div>
      <h2>Gestión de Sucursales</h2>
      <p>Administra las ubicaciones físicas del restaurante</p>
    </div>

    <button
      type="button"
      class="add-branch-button"
      (click)="openCreateBranchForm()"
    >
      <span>+</span>
      Nueva Sucursal
    </button>
  </header>

  <app-branch-list
    [branches]="branches"
    (editBranch)="openEditBranchForm($event)"
    (deleteBranch)="openDeleteConfirmation($event)"
  />

  <app-owner-modal
    *ngIf="showBranchForm"
    [title]="modalTitle"
    [subtitle]="modalSubtitle"
    (closeModal)="closeBranchForm()"
  >
    <app-branch-form
      [saving]="creatingBranch || updatingBranch"
      [branch]="selectedBranch"
      (createBranch)="onCreateBranch($event)"
      (updateBranch)="onUpdateBranch($event)"
    />
  </app-owner-modal>

  <app-owner-modal
    *ngIf="branchPendingDelete"
    title="Eliminar sucursal"
    subtitle="Esta acción desactivará la sucursal, no la eliminará físicamente."
    (closeModal)="closeDeleteConfirmation()"
  >
    <section class="delete-confirmation">
      <p>
        ¿Seguro que quieres eliminar la sucursal
        <strong>{{ branchPendingDelete.name }}</strong>?
      </p>

      <div class="delete-actions">
        <button
          type="button"
          class="cancel-delete-button"
          (click)="closeDeleteConfirmation()"
          [disabled]="deletingBranch"
        >
          Cancelar
        </button>

        <button
          type="button"
          class="confirm-delete-button"
          (click)="confirmDeleteBranch()"
          [disabled]="deletingBranch"
        >
          {{ deletingBranch ? 'Eliminando...' : 'Sí, eliminar' }}
        </button>
      </div>
    </section>
  </app-owner-modal>
</section>
