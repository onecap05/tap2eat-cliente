<section class="form-card">
  <div class="form-header">
    <h3>Nueva sucursal</h3>
    <p>Agrega una ubicación donde tu restaurante atiende pedidos.</p>
  </div>

  <p *ngIf="errorMessage" class="form-error">
    {{ errorMessage }}
  </p>

  <form class="form-grid" (ngSubmit)="submit()">
    <label>
      Nombre de la sucursal
      <input
        type="text"
        name="branchName"
        [(ngModel)]="form.name"
        placeholder="Ej. Sucursal Centro"
        required
      />
    </label>

    <label>
      Teléfono
      <input
        type="text"
        name="branchPhoneNumber"
        [(ngModel)]="form.phoneNumber"
        placeholder="Ej. 2281234567"
      />
    </label>

    <section class="address-section">
  <h4>Dirección de la sucursal</h4>

  <div class="address-grid">
    <label>
      Calle
      <input
        type="text"
        name="branchStreet"
        [(ngModel)]="form.street"
        placeholder="Ej. Av. Enríquez"
        required
      />
    </label>

    <label>
      Número exterior
      <input
        type="text"
        name="branchExteriorNumber"
        [(ngModel)]="form.exteriorNumber"
        placeholder="Ej. 10"
      />
    </label>

    <label>
      Número interior
      <input
        type="text"
        name="branchInteriorNumber"
        [(ngModel)]="form.interiorNumber"
        placeholder="Opcional"
      />
    </label>

    <label>
      Código postal
      <input
        type="text"
        name="branchPostalCode"
        [(ngModel)]="form.postalCode"
        (blur)="lookupPostalCode()"
        maxlength="5"
        placeholder="Ej. 91020"
      />
    </label>

    <label>
      Colonia
      <select
        name="branchNeighborhood"
        [(ngModel)]="form.neighborhood"
        [disabled]="loadingPostalCode || neighborhoodOptions.length === 0"
        required
      >
        <option value="">Selecciona una colonia</option>
        <option
          *ngFor="let neighborhood of neighborhoodOptions"
          [value]="neighborhood"
        >
          {{ neighborhood }}
        </option>
      </select>
    </label>

    <label>
      Ciudad / Municipio
      <input
        type="text"
        name="branchCity"
        [(ngModel)]="form.city"
        placeholder="Ej. Xalapa"
        required
      />
    </label>

    <label>
      Estado
      <input
        type="text"
        name="branchState"
        [(ngModel)]="form.state"
        placeholder="Ej. Veracruz"
        required
      />
    </label>

    <label>
      País
      <input
        type="text"
        name="branchCountry"
        [(ngModel)]="form.country"
        placeholder="Ej. México"
        required
      />
    </label>
  </div>

  <p *ngIf="postalCodeMessage" class="field-message">
    {{ postalCodeMessage }}
  </p>

  <label>
    Referencias
    <input
      type="text"
      name="branchAddressReference"
      [(ngModel)]="form.addressReference"
      placeholder="Ej. Frente al parque, local color verde"
    />
  </label>
</section>

    <section class="map-section">
      <div class="map-section-header">
        <div>
          <h4>Ubicación en el mapa</h4>
          <p>{{ mapMessage }}</p>
        </div>

        <button
          type="button"
          class="secondary-button"
          (click)="centerOnCurrentLocation()"
        >
          Usar mi ubicación
        </button>
      </div>

      <div #mapContainer class="map-container"></div>

      <p class="map-help">
        Haz clic en el mapa o arrastra el marcador para ajustar la ubicación exacta.
      </p>
    </section>

    

    <label class="checkbox-label">
      <input
        type="checkbox"
        name="branchIsMainBranch"
        [(ngModel)]="form.isMainBranch"
      />
      Marcar como sucursal principal
    </label>

    <button type="submit" [disabled]="saving">
  {{ submitButtonLabel }}
</button>
  </form>
</section>
