<div class="forgot-page">
  <div class="brand-section">
    <div class="brand-logo">T2E</div>
    <h1 class="brand-title">Tap2Eat</h1>
    <p class="brand-subtitle">Tu comida favorita sin esperas</p>
  </div>

  <div class="forgot-card">
    <h2 class="forgot-title">Recuperar Contraseña</h2>
    <p class="forgot-subtitle">Te enviaremos un código para restablecerla</p>

    <form (ngSubmit)="onSubmit()" class="forgot-form">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <div class="input-wrapper">
          <span class="input-icon">✉</span>
          <input
            id="email"
            name="email"
            type="email"
            [(ngModel)]="email"
            required
            placeholder="tu@email.com"
          />
        </div>
      </div>

      <button type="submit" class="forgot-button" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Enviando...' : 'Enviar Código' }}
      </button>
    </form>

    <div class="login-row">
      <span>¿Recordaste tu contraseña?</span>
      <a routerLink="/login">Inicia Sesión</a>
    </div>

    <div class="message success" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <div class="message error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>
  </div>
</div>
