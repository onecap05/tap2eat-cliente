<div class="login-page">
  <div class="brand-section">
    <div class="brand-logo">T2E</div>
    <h1 class="brand-title">Tap2Eat</h1>
    <p class="brand-subtitle">Tu comida favorita sin esperas</p>
  </div>

  <div class="login-card">
    <h2 class="login-title">Iniciar Sesión</h2>
    <p class="login-subtitle">¡Bienvenido de nuevo!</p>

    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <div class="input-wrapper">
          <span class="input-icon">✉</span>
          <input
            id="email"
            name="email"
            type="email"
            [(ngModel)]="request.email"
            required
            placeholder="tu@email.com"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input
            id="password"
            name="password"
            type="password"
            [(ngModel)]="request.password"
            required
            placeholder="••••••••"
          />
        </div>
      </div>

      <div class="forgot-password-row">
        <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="login-button" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Iniciando...' : 'Iniciar Sesión' }}
      </button>
    </form>

    <div class="register-row">
      <span>¿No tienes cuenta?</span>
      <a routerLink="/register">Regístrate</a>
    </div>

    <div class="message success" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <div class="message error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>
  </div>
</div>
