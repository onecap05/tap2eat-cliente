<div class="reset-page">
  <div class="brand-section">
    <div class="brand-logo">T2E</div>
    <h1 class="brand-title">Tap2Eat</h1>
    <p class="brand-subtitle">Tu comida favorita sin esperas</p>
  </div>

  <div class="reset-card">
    <h2 class="reset-title">Restablecer Contraseña</h2>
    <p class="reset-subtitle">Ingresa tu código y tu nueva contraseña</p>

    <div class="email-box" *ngIf="email">
      <span class="email-label">Correo:</span>
      <span class="email-value">{{ email }}</span>
    </div>

    <form (ngSubmit)="onSubmit()" class="reset-form">
      <div class="form-group">
        <label for="code">Código</label>
        <div class="input-wrapper">
          <span class="input-icon">#</span>
          <input
            id="code"
            name="code"
            type="text"
            [(ngModel)]="code"
            required
            placeholder="Ingresa tu código"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="newPassword">Nueva contraseña</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input
            id="newPassword"
            name="newPassword"
            type="password"
            [(ngModel)]="newPassword"
            required
            placeholder="Ingresa tu nueva contraseña"
          />
        </div>
      </div>

      <button type="submit" class="reset-button" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Guardando...' : 'Restablecer Contraseña' }}
      </button>
    </form>

    <div class="login-row">
      <span>¿Ya la recuperaste?</span>
      <a routerLink="/login">Inicia Sesión</a>
    </div>

    <div class="message success" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <div class="message error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>
  </div>
</div>
