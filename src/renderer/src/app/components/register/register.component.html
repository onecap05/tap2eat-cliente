<div class="register-page">
  <div class="brand-section">
    <div class="brand-logo">T2E</div>
    <h1 class="brand-title">Tap2Eat</h1>
    <p class="brand-subtitle">Tu comida favorita sin esperas</p>
  </div>

  <div class="register-card">
    <h2 class="register-title">Crear Cuenta</h2>
    <p class="register-subtitle">Únete a Tap2Eat hoy</p>

    <form (ngSubmit)="onSubmit()" class="register-form">
      <div class="form-group">
        <label for="firstName">Nombre</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input
            id="firstName"
            name="firstName"
            type="text"
            [(ngModel)]="request.firstName"
            required
            maxlength="100"
            placeholder="Tu nombre"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="lastName">Apellido</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input
            id="lastName"
            name="lastName"
            type="text"
            [(ngModel)]="request.lastName"
            required
            maxlength="100"
            placeholder="Tu apellido"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <div class="input-wrapper">
          <span class="input-icon">✉</span>
          <input
            id="email"
            name="email"
            type="email"
            [(ngModel)]="request.email"
            required
            maxlength="255"
            placeholder="tu@email.com"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input
            id="password"
            name="password"
            type="password"
            [(ngModel)]="request.password"
            required
            maxlength="72"
            placeholder="••••••••"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="role">Tipo de cuenta</label>
        <div class="select-wrapper">
          <select
            id="role"
            name="role"
            [(ngModel)]="request.role"
            required
          >
            <option
              *ngFor="let role of availableRoles"
              [value]="role.value"
            >
              {{ role.label }}
            </option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="phone">Teléfono (opcional)</label>
        <div class="input-wrapper">
          <span class="input-icon">📞</span>
          <input
            id="phone"
            name="phone"
            type="text"
            [(ngModel)]="request.phone"
            maxlength="30"
            placeholder="Tu teléfono"
          />
        </div>
      </div>

      <button type="submit" class="register-button" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Creando...' : 'Crear Cuenta' }}
      </button>
    </form>

    <div class="login-row">
      <span>¿Ya tienes cuenta?</span>
      <a routerLink="/login">Inicia Sesión</a>
    </div>

    <div class="message success" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <div class="message error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>
  </div>
</div>
